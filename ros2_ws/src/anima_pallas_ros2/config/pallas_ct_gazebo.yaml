anima_pallas_ct_node:
  ros__parameters:
    lidar_type: "generic"

    pointcloud_topic: "/anima/lidar/points"
    imu_topic: "/anima/imu/data"

    pose_topic: "/pallas/ct/pose"
    odom_topic: "/pallas/ct/odom"
    map_topic: "/pallas/ct/local_map"
    aligned_scan_topic: "/pallas/ct/aligned_scan"

    odom_frame: "odom"
    base_frame: "imu_frame"

    # The ANIMA Gazebo smoke path assumes the standard module interface from
    # the simulator repo. Keep these zeroed unless you intentionally change the
    # LiDAR-to-IMU geometry in the simulated robot model.
    sensor_to_body_translation: [0.0, 0.0, 0.0]
    sensor_to_body_rpy: [0.0, 0.0, 0.0]

    stationary_init_sec: 2.0
    # The Gazebo IMU stream on /anima/imu/data is already gravity-compensated,
    # so the bootstrap and strapdown tracker must not subtract 9.80665 again.
    gravity_mps2: 0.0
    min_range_m: 0.1
    max_range_m: 30.0
    scan_voxel_size_m: 0.10
    scan_normal_radius_m: 0.30
    scan_min_points_for_normal: 6
    map_voxel_size_m: 0.20
    map_max_surfels: 50000
    map_max_age_sec: 60.0
    max_imu_buffer_size: 20000
    map_publish_period_scans: 1
    ct_min_control_points: 4
    ct_max_control_points: 64
