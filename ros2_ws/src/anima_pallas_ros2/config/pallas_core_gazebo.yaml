anima_pallas_core_node:
  ros__parameters:
    lidar_type: "generic"

    # ANIMA Gazebo simulation topics.
    # The terrain.sdf world publishes LiDAR on the standard ANIMA path,
    # but the IMU lands on /imu (not /anima/imu/data) via ros_gz_bridge.
    pointcloud_topic: "/anima/lidar/points"
    imu_topic: "/imu"

    pose_topic: "/pallas/core/pose"
    odom_topic: "/pallas/core/odom"
    map_topic: "/pallas/core/local_map"
    aligned_scan_topic: "/pallas/core/aligned_scan"

    odom_frame: "odom"
    # The Gazebo Go2 robot publishes LiDAR in this frame.
    # PALLAS uses it as the base_frame for TF: odom → base_frame.
    # pallas_demo.sdf: unitree_go2/lidar_link/lidar
    # terrain.sdf: quadruped_robot/lidar/lidar
    base_frame: "unitree_go2/lidar_link/lidar"

    sensor_to_body_translation: [0.0, 0.0, 0.0]
    sensor_to_body_rpy: [0.0, 0.0, 0.0]

    # Gazebo IMU reports raw acceleration including gravity (~9.8 in z).
    stationary_init_sec: 1.0
    gravity_mps2: 9.80665
    max_accel_std_mps2: 0.5
    max_gyro_std_radps: 0.1
    max_accel_norm_error_mps2: 1.0

    # Gazebo ros_gz_bridge publishes with RELIABLE QoS. Default BEST_EFFORT
    # subscribers silently drop these messages in CycloneDDS.
    imu_qos_reliability: "reliable"
    cloud_qos_reliability: "reliable"

    min_range_m: 0.1
    max_range_m: 30.0
    scan_voxel_size_m: 0.10
    scan_normal_radius_m: 0.30
    scan_min_points_for_normal: 6
    map_voxel_size_m: 0.20
    map_max_surfels: 50000
    map_max_age_sec: 60.0
    max_imu_buffer_size: 20000
    map_publish_period_scans: 1
    ct_min_control_points: 4
    ct_max_control_points: 64
