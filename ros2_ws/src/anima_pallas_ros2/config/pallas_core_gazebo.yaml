anima_pallas_core_node:
  ros__parameters:
    lidar_type: "generic"

    pointcloud_topic: "/anima/lidar/points"
    imu_topic: "/imu"

    pose_topic: "/pallas/core/pose"
    odom_topic: "/pallas/core/odom"
    map_topic: "/pallas/core/local_map"
    aligned_scan_topic: "/pallas/core/aligned_scan"

    odom_frame: "odom"
    base_frame: "quadruped_robot/lidar/lidar"

    sensor_to_body_translation: [0.0, 0.0, 0.0]
    sensor_to_body_rpy: [0.0, 0.0, 0.0]

    stationary_init_sec: 0.5
    # The Gazebo IMU is gravity-compensated (accel ~0 when stationary).
    gravity_mps2: 0.0
    # Relaxed bootstrap thresholds for simulated IMU noise.
    max_accel_std_mps2: 1.0
    max_gyro_std_radps: 0.5
    max_accel_norm_error_mps2: 2.0
    min_range_m: 0.1
    max_range_m: 30.0
    scan_voxel_size_m: 0.10
    scan_normal_radius_m: 0.30
    scan_min_points_for_normal: 6
    map_voxel_size_m: 0.20
    map_max_surfels: 50000
    map_max_age_sec: 60.0
    max_imu_buffer_size: 20000
    map_publish_period_scans: 1
    ct_min_control_points: 4
    ct_max_control_points: 64
